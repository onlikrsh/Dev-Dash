<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Dash</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="dashboard" id="dashboard">

        <!-- ----------------------------------Clock Widget---------------------------------- -->
        <div class="widget widget--clock" id="widget-clock">
            <div class="pill-header" style="position: absolute; top: 20px; left: 20px;" vid="10">

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vid="11"><circle cx="12" cy="12" r="10" vid="12"></circle><polyline points="12 6 12 12 16 14" vid="13"></polyline></svg>
                <span vid="14">Local System</span>

            </div>
            <div class="widget__time" id="clock-time">00:00:00</div>
            <div class="widget__date" id="clock-date">Loading...</div>
        </div>
        <!-- ----------------------------------Clock Widget Ends---------------------------------- -->


        <!-- ----------------------------------Weather Widget---------------------------------- -->
        <div class="widget widget-weather" vid="17">

            <div class="pill-header" vid="18">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vid="19"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" vid="20"></path></svg>
                <span vid="21">Weather</span>
            </div>

            <div class="weather-main" vid="22">
                <div class="temp-display" vid="23">22°</div>
                <svg class="weather-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" vid="24"><circle cx="12" cy="12" r="5" vid="25"></circle><line x1="12" y1="1" x2="12" y2="3" vid="26"></line><line x1="12" y1="21" x2="12" y2="23" vid="27"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" vid="28"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" vid="29"></line><line x1="1" y1="12" x2="3" y2="12" vid="30"></line><line x1="21" y1="12" x2="23" y2="12" vid="31"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" vid="32"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" vid="33"></line></svg>
            </div>

            <div class="weather-detail" vid="34">
                <span class="token-key" vid="35">loc</span>: <span class="token-string" vid="36">Loading...</span>
            </div>

        </div>
        <!-- ----------------------------------Weather Widget Ends---------------------------------- -->

        <!-- ----------------------------------Pomodoro Widget---------------------------------- -->
        <div class="widget widget-pomo" id="widget-pomo">
            <div class="pill-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="6" x2="12" y2="12"></line>
                    <line x1="12" y1="12" x2="16" y2="14"></line>
                </svg>
                <span>Focus</span>
            </div>
            <div class="timer-circle">
                <div class="pomo-time" id="pomo-display">25:00</div>
                <div class="pomo-controls">
                    <button class="btn-icon primary" id="pomo-toggle" aria-label="Start timer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="16" height="16">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </button>
                    <button class="btn-icon" id="pomo-reset" aria-label="Reset timer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- ----------------------------------Pomodoro Widget Ends---------------------------------- -->


        <!-- ----------------------------------Github Widget---------------------------------- -->
        <div class="widget widget-github" id="widget-github">
            <div class="pill-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                </svg>
                <span>Contributions</span>
            </div>
            <div class="github-stats" id="github-stats">
                <div class="stat-item">
                    <span class="label">Total</span>
                    <span class="stat-value token-var" id="github-total">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">Streak</span>
                    <span class="stat-value" id="github-streak">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">Top Lang</span>
                    <span class="stat-value token-string" id="github-lang">--</span>
                </div>
            </div>
            <div class="contribution-graph" id="contrib-grid"></div>
        </div>
        <!-- ----------------------------------Github Widget Ends---------------------------------- -->

        <!-- ----------------------------------Bookmarks Widget---------------------------------- -->
        <div class="widget widget-bookmarks" id="widget-bookmarks">
            <div class="pill-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>Resources</span>
            </div>
            <ul class="bookmark-list" id="bookmarks-list"></ul>
            <div class="bookmarks-add" id="bookmarks-add">
                <input type="text" class="bookmarks-input" id="bookmark-url" placeholder="URL...">
                <input type="text" class="bookmarks-input" id="bookmark-name" placeholder="Name...">
                <button class="btn-icon" id="bookmark-add-btn" aria-label="Add bookmark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
        <!-- ----------------------------------Bookmarks Widget Ends---------------------------------- -->



    </main>
    <script type="module" src="js/app.js"></script>
</body>

</html>
